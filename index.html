<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerForge | Professional Dashboard</title>
    <style>
        :root { --sidebar-bg: #07224f; --main-bg: #f4f7fc; --primary-blue: #0066ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; background-color: var(--main-bg); min-height: 100vh; }
        
        /* Auth */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #07224f; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: white; padding: 30px; border-radius: 12px; width: 350px; }
        .hidden { display: none !important; }
        
        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); color: white; padding: 20px; }
        .menu-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .menu-item:hover { background: var(--primary-blue); }
        
        /* Main */
        .main-container { flex-grow: 1; padding: 30px; }
        .form-control { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; background: var(--primary-blue); color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">Ingia</h2>
            <div id="auth-fields">
                <input type="email" id="email" class="form-control" placeholder="Email">
                <input type="password" id="pass" class="form-control" placeholder="Password">
                <button class="btn" onclick="handleAuth()">Ingia</button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <h2>CareerForge</h2>
        <div class="menu-item" onclick="alert('Dashboard inafunguka...')">📊 Dashboard</div>
        <div class="menu-item" onclick="logout()">🚪 Logout</div>
    </aside>

    <main class="main-container">
        <h1>Dashboard</h1>
        <p>Karibu kwenye mfumo wako.</p>
    </main>

    <script>
        // 1. Angalia Login wakati wa kufungua
        window.onload = () => {
            if (localStorage.getItem('isAuth') === 'true') {
                document.getElementById('auth-overlay').classList.add('hidden');
            }
        };

        // 2. Kazi ya Login
        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            
            if(email && pass) {
                localStorage.setItem('isAuth', 'true');
                document.getElementById('auth-overlay').classList.add('hidden');
                alert("Karibu!");
            } else {
                alert("Tafadhali jaza maelezo yote!");
            }
        }

        // 3. Kazi ya Logout
        function logout() {
            localStorage.removeItem('isAuth');
            location.reload();
        }
    </script>
</body>
</html>
